name: Deploy migrations to production

# Apply Supabase migrations to the production database whenever migrations (or
# the Supabase config) change on main. Manual runs are allowed via the Actions
# tab (workflow_dispatch) — useful for a no-op dry run.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-migrations.yml"
  workflow_dispatch:

# Avoid two deploys racing on the same database.
concurrency:
  group: supabase-prod-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: qgllfglrtwlvarafwxue
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_ID"

      - name: Push migrations
        run: supabase db push
